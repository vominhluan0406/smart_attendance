{{define "alert-success"}}
<div class="rounded-md bg-green-50 p-4 mb-4">
    <div class="flex">
        <div class="ml-3">
            <p class="text-sm font-medium text-green-800">{{.}}</p>
        </div>
    </div>
</div>
{{end}}

{{define "alert-error"}}
<div class="rounded-md bg-red-50 p-4 mb-4">
    <div class="flex">
        <div class="ml-3">
            <p class="text-sm font-medium text-red-800">{{.}}</p>
        </div>
    </div>
</div>
{{end}}
