<div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-black text-gray-900 flex items-center gap-2 uppercase tracking-tight">
        <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-600"></i>
        Biểu đồ chấm công
    </h2>
    <span class="px-3 py-1 bg-indigo-50 text-[10px] font-black text-indigo-600 rounded-full uppercase tracking-widest">14 ngày gần nhất</span>
</div>
<div class="relative" style="height: 320px;">
    <canvas id="attendanceChart"></canvas>
</div>
<script>
(function() {
    const chartDataRaw = {{.ChartJSON}};
    if (!chartDataRaw || chartDataRaw.length === 0) return;

    function renderChart() {
        const labels = chartDataRaw.map(d => {
            const date = new Date(d.Date);
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
        });

        const ctx = document.getElementById('attendanceChart').getContext('2d');
        new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Đúng giờ',
                    data: chartDataRaw.map(d => d.OnTime),
                    backgroundColor: 'rgba(34, 197, 94, 0.8)',
                    borderRadius: 4,
                    barPercentage: 0.7,
                },
                {
                    label: 'Đi trễ',
                    data: chartDataRaw.map(d => d.Late),
                    backgroundColor: 'rgba(245, 158, 11, 0.8)',
                    borderRadius: 4,
                    barPercentage: 0.7,
                },
                {
                    label: 'Vắng',
                    data: chartDataRaw.map(d => d.Absent),
                    backgroundColor: 'rgba(239, 68, 68, 0.8)',
                    borderRadius: 4,
                    barPercentage: 0.7,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
            },
            scales: {
                x: { stacked: true, grid: { display: false } },
                y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } }
            }
        }
    });
    } // end renderChart

    if (typeof Chart !== 'undefined') {
        renderChart();
    } else if (window.loadChartJS) {
        loadChartJS(renderChart);
    }
})();
</script>
