<div class="flex flex-col items-center">
    <div
        class="relative w-64 h-64 mb-6 p-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
        <img src="/attendance/qr/{{.BranchID}}/image?t={{.TOTPCode}}" alt="QR Code" class="w-full h-full object-contain"
            width="256" height="256">
    </div>

    <div class="w-full max-w-xs">
        <div class="flex justify-between text-sm font-medium text-gray-500 mb-2">
            <span>Code expires in</span>
            <span id="countdown-text" class="text-indigo-600 font-bold">{{.Remaining}}s</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
            <div id="countdown-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-1000 ease-linear"
                style="width: 100%"></div>
        </div>
    </div>
</div>

<script>
    (function () {
        let timeLeft = parseInt("{{.Remaining}}", 10);
        const totalTime = 15; // Assume 15s is the standard validity period for our TOTP
        const countdownText = document.getElementById('countdown-text');
        const countdownBar = document.getElementById('countdown-bar');

        // Initial setup
        let widthPercent = (timeLeft / totalTime) * 100;
        countdownBar.style.width = widthPercent + '%';

        if (window.qrCountdownInterval) {
            clearInterval(window.qrCountdownInterval);
        }

        window.qrCountdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(window.qrCountdownInterval);
                countdownText.innerText = '0s';
                countdownBar.style.width = '0%';

                // Trigger HTMX refresh
                document.body.dispatchEvent(new Event('refresh-qr'));
            } else {
                countdownText.innerText = timeLeft + 's';

                widthPercent = (timeLeft / totalTime) * 100;
                countdownBar.style.width = widthPercent + '%';

                // Urgent coloring when < 5s
                if (timeLeft < 5) {
                    countdownBar.classList.remove('bg-indigo-600');
                    countdownBar.classList.add('bg-red-500');
                    countdownText.classList.remove('text-indigo-600');
                    countdownText.classList.add('text-red-500');
                }
            }
        }, 1000);
    })();
</script>
