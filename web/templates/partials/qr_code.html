{{define "qr_code_inner"}}
<div>
    <img src="/attendance/qr/{{.BranchID}}/image?t={{.TOTPCode}}"
         alt="QR Code" class="mx-auto mb-4 rounded-lg" width="256" height="256">
    <div class="text-4xl font-mono font-bold tracking-widest text-gray-900 mb-2">
        {{.TOTPCode}}
    </div>
    <div class="text-sm text-gray-500">
        Refreshes in <span class="font-semibold text-indigo-600">{{.Remaining}}s</span>
    </div>
</div>
{{end}}
