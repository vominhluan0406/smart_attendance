{{if .Success}}
<div
    class="rounded-2xl bg-green-50 p-6 border border-green-100 shadow-sm animate-in fade-in slide-in-from-top-4 duration-500">
    <div class="flex flex-col items-center text-center">
        <div class="p-3 bg-green-100 rounded-full mb-4">
            <i data-lucide="check-circle" class="w-8 h-8 text-green-600"></i>
        </div>
        <h3 class="text-lg font-bold text-green-900">
            {{if .CheckedOut}}Check-out thành công!{{else}}Điểm danh thành công!{{end}}
        </h3>

        {{if not .CheckedOut}}
        <div class="mt-4 flex flex-wrap justify-center gap-2">
            {{if .TOTP}}<span
                class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-lg uppercase tracking-wider">QR
                Verified</span>{{end}}
            {{if .IP}}<span
                class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-lg uppercase tracking-wider">IP
                Verified</span>{{end}}
            {{if .Location}}<span
                class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-lg uppercase tracking-wider">Location
                Verified</span>{{end}}
        </div>
        {{end}}

        <div class="mt-6 w-full">
            <a href="/attendance"
                class="inline-flex w-full items-center justify-center rounded-xl bg-green-600 px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-green-700 transition-all">
                Xong
            </a>
        </div>
    </div>
</div>
<script>
    if (window.showToast) {
        showToast("{{if .CheckedOut}}Check-out thành công{{else}}Điểm danh thành công{{end}}", "success");
    }
    lucide.createIcons();
</script>
{{else}}
<div
    class="rounded-2xl bg-red-50 p-6 border border-red-100 shadow-sm animate-in fade-in slide-in-from-top-4 duration-500">
    <div class="flex flex-col items-center text-center">
        <div class="p-3 bg-red-100 rounded-full mb-4">
            <i data-lucide="alert-circle" class="w-8 h-8 text-red-600"></i>
        </div>
        <h3 class="text-lg font-bold text-red-900">Thất bại</h3>
        <p class="mt-2 text-sm text-red-700 font-medium">{{.Error}}</p>

        <div class="mt-6 w-full">
            <button onclick="location.reload()"
                class="inline-flex w-full items-center justify-center rounded-xl bg-red-600 px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-red-700 transition-all">
                Thử lại
            </button>
        </div>
    </div>
</div>
<script>
    if (window.showToast) {
        showToast("Lỗi: {{.Error}}", "error");
    }
    lucide.createIcons();
</script>
{{end}}
