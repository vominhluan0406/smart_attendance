{{define "title"}}Đăng ký — Smart Attendance{{end}}

{{define "body"}}
<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
        <h1 class="text-center text-2xl font-bold text-indigo-600">Smart Attendance</h1>
        <h2 class="mt-4 text-center text-xl font-bold leading-9 tracking-tight text-gray-900">
            Tạo tài khoản mới
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
        <form hx-post="/auth/register" hx-target="#form-message" hx-swap="innerHTML" class="space-y-6">
            <div id="form-message"></div>

            <div>
                <label for="full_name" class="block text-sm font-medium leading-6 text-gray-900">Họ và tên</label>
                <div class="mt-2">
                    <input id="full_name" name="full_name" type="text" required
                           class="block w-full rounded-md border-0 py-1.5 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                           placeholder="Nguyen Van A">
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium leading-6 text-gray-900">Email</label>
                <div class="mt-2">
                    <input id="email" name="email" type="email" required
                           class="block w-full rounded-md border-0 py-1.5 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                           placeholder="you@example.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium leading-6 text-gray-900">Mật khẩu</label>
                <div class="mt-2">
                    <input id="password" name="password" type="password" required minlength="6"
                           class="block w-full rounded-md border-0 py-1.5 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                </div>
            </div>

            <div>
                <label for="password_confirm" class="block text-sm font-medium leading-6 text-gray-900">Xác nhận mật khẩu</label>
                <div class="mt-2">
                    <input id="password_confirm" name="password_confirm" type="password" required minlength="6"
                           class="block w-full rounded-md border-0 py-1.5 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                </div>
            </div>

            <div>
                <button type="submit"
                        class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    <span class="htmx-indicator mr-2">
                        <svg class="animate-spin h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </span>
                    Đăng ký
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Đã có tài khoản?
            <a href="/auth/login" class="font-semibold leading-6 text-indigo-600 hover:text-indigo-500">Đăng nhập</a>
        </p>
    </div>
</div>
{{end}}
