{{define "title"}}Branches — Smart Attendance{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <div class="sm:flex sm:items-center sm:justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Branch Management</h1>
                <p class="mt-1 text-sm text-gray-500">Manage company branches and check-in configurations</p>
            </div>
            <div class="mt-4 sm:mt-0">
                <a href="/branches/create" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    + Add Branch
                </a>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
            <form hx-get="/branches" hx-target="#branch-table" hx-swap="innerHTML" hx-push-url="true" class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                    <input type="text" name="search" value="{{.Search}}" placeholder="Branch name or address..."
                           class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300">
                </div>
                <button type="submit" class="rounded-md bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-200">Filter</button>
            </form>
        </div>

        <div id="branch-table">
            {{template "branch_table" .}}
        </div>
    </main>
</div>
{{end}}
