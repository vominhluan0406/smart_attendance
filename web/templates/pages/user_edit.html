{{define "title"}}Edit User — Smart Attendance{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <div class="mb-6">
            <a href="/users" class="text-sm text-indigo-600 hover:text-indigo-500">&larr; Back to Users</a>
            <h1 class="mt-2 text-2xl font-bold text-gray-900">Edit User</h1>
        </div>

        <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-6 max-w-2xl">
            <form hx-put="/users/{{.User.ID}}" hx-target="#form-message" hx-swap="innerHTML" class="space-y-6">
                <div id="form-message"></div>

                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label for="full_name" class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" name="full_name" id="full_name" required value="{{.User.FullName}}"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" name="email" id="email" required value="{{.User.Email}}"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">New Password <span class="text-gray-400">(leave blank to keep)</span></label>
                        <input type="password" name="password" id="password" minlength="6"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300">
                    </div>
                    <div>
                        <label for="role" class="block text-sm font-medium text-gray-700">Role</label>
                        <select name="role" id="role"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300">
                            <option value="employee" {{if eq (printf "%s" .User.Role) "employee"}}selected{{end}}>Employee</option>
                            <option value="manager" {{if eq (printf "%s" .User.Role) "manager"}}selected{{end}}>Manager</option>
                            <option value="admin" {{if eq (printf "%s" .User.Role) "admin"}}selected{{end}}>Admin</option>
                        </select>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" name="is_active" id="is_active" {{if .User.IsActive}}checked{{end}}
                               class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-600">
                        <label for="is_active" class="ml-2 block text-sm text-gray-900">Active</label>
                    </div>
                </div>

                <div class="flex justify-end gap-3">
                    <a href="/users" class="rounded-md bg-white px-4 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Cancel</a>
                    <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Save Changes</button>
                </div>
            </form>
        </div>
    </main>
</div>
{{end}}
