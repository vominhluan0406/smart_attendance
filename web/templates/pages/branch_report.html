{{define "title"}}Báo cáo chi nhánh — {{.Branch.Name}}{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <div class="mb-6 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
            <div>
                <div class="flex items-center gap-2 text-sm text-indigo-600 font-medium mb-1">
                    <a href="/branches" class="hover:underline">Chi nhánh</a>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    <span>Báo cáo</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">{{.Branch.Name}}</h1>
                <p class="text-sm text-gray-500 mt-1">Báo cáo chấm công chi nhánh</p>
            </div>
            <a href="/reports/branch/{{.Branch.ID}}/export?date_from={{.DateFrom}}&date_to={{.DateTo}}&status={{.Status}}"
                class="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-indigo-600 text-sm font-bold text-white shadow-sm hover:bg-indigo-700 transition-all">
                <i data-lucide="download" class="w-4 h-4"></i>
                Export Excel
            </a>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6">
            <form id="filter-form" class="flex flex-wrap gap-4 items-end"
                hx-get="/reports/branch/{{.Branch.ID}}/partial"
                hx-target="#history-list"
                hx-swap="innerHTML"
                hx-push-url="false">

                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Từ ngày</label>
                    <input type="date" name="date_from" value="{{.DateFrom}}"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                </div>

                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Đến ngày</label>
                    <input type="date" name="date_to" value="{{.DateTo}}"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                </div>

                <div class="w-36">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Trạng thái</label>
                    <select name="status"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                        <option value="">Tất cả</option>
                        <option value="on_time" {{if eq .Status "on_time"}}selected{{end}}>Đúng giờ</option>
                        <option value="late" {{if eq .Status "late"}}selected{{end}}>Trễ</option>
                        <option value="absent" {{if eq .Status "absent"}}selected{{end}}>Vắng</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button type="submit"
                        class="rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-200 transition-colors">
                        Lọc
                    </button>
                    <a href="/reports/branch/{{.Branch.ID}}"
                        class="rounded-lg bg-white border border-gray-200 px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-50 transition-colors">
                        Xoá lọc
                    </a>
                </div>
            </form>
        </div>

        {{if .Error}}
        <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
            <div class="flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
                <p class="text-sm text-red-700">{{.Error}}</p>
            </div>
        </div>
        {{end}}

        <!-- Table content (HTMX target) -->
        <div id="history-list" class="relative">
            {{template "history_list.html" .}}
        </div>
    </main>
</div>
{{end}}
