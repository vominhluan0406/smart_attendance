{{define "title"}}Chấm công dự phòng — Smart Attendance{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}
    <main class="mx-auto max-w-7xl px-4 py-12 flex flex-col items-center">
        <div class="w-full max-w-md">
            <!-- Result Target -->
            <div id="checkin-result" class="mb-6"></div>

            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 transition-all duration-500">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4">
                        <i data-lucide="key-round" class="w-8 h-8"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900">Chấm công bằng mật khẩu</h1>
                    <p class="text-gray-500 mt-2">Dùng tài khoản & mật khẩu khi quên điện thoại</p>
                </div>

                <form hx-post="/attendance/password" 
                    hx-target="#checkin-result" 
                    hx-swap="innerHTML"
                    hx-indicator="#indicator"
                    class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email / Mã nhân viên</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </span>
                            <input type="text" name="email" required
                                class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
                                placeholder="nv.nguyenvana@gmail.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i data-lucide="lock" class="w-5 h-5"></i>
                            </span>
                            <input type="password" name="password" required
                                class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" 
                                id="submit-btn"
                                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-2 transform active:scale-95 shadow-lg shadow-indigo-200">
                            <span id="indicator" class="htmx-indicator animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></span>
                            Xác nhận Chấm công
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <a href="/" class="text-indigo-600 font-semibold hover:text-indigo-700 flex items-center justify-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>
{{end}}
