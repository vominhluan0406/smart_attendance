{{define "title"}}Create Branch — Smart Attendance{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <div class="mb-6">
            <a href="/branches" class="text-sm text-indigo-600 hover:text-indigo-500">&larr; Back to Branches</a>
            <h1 class="mt-2 text-2xl font-bold text-gray-900">Create Branch</h1>
        </div>

        <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-6 max-w-3xl">
            <form hx-post="/branches/create" hx-target="#form-message" hx-swap="innerHTML" class="space-y-8">
                <div id="form-message"></div>

                <!-- Basic Info -->
                <fieldset>
                    <legend class="text-lg font-semibold text-gray-900 mb-4">Basic Information</legend>
                    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700">Branch Name</label>
                            <input type="text" name="name" id="name" required
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                            <input type="text" name="address" id="address"
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="work_start_time" class="block text-sm font-medium text-gray-700">Work Start</label>
                            <input type="time" name="work_start_time" id="work_start_time" value="08:00"
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="work_end_time" class="block text-sm font-medium text-gray-700">Work End</label>
                            <input type="time" name="work_end_time" id="work_end_time" value="17:00"
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                    </div>
                </fieldset>

                <!-- Check-in Methods -->
                <fieldset>
                    <legend class="text-lg font-semibold text-gray-900 mb-4">Allowed Check-in Methods</legend>
                    <div class="space-y-3">
                        <label class="flex items-center">
                            <input type="checkbox" name="allowed_methods" value="qr_totp" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600">
                            <span class="ml-2 text-sm text-gray-700">QR Code (TOTP — refreshes every 15s)</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="allowed_methods" value="ip" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600">
                            <span class="ml-2 text-sm text-gray-700">IP Whitelist</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="allowed_methods" value="location" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600">
                            <span class="ml-2 text-sm text-gray-700">GPS Location</span>
                        </label>
                    </div>
                </fieldset>

                <!-- Location -->
                <fieldset>
                    <legend class="text-lg font-semibold text-gray-900 mb-4">Default Location (GPS Center)</legend>
                    <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
                        <div>
                            <label for="lat" class="block text-sm font-medium text-gray-700">Latitude</label>
                            <input type="number" step="any" name="lat" id="lat" placeholder="10.762622"
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="lng" class="block text-sm font-medium text-gray-700">Longitude</label>
                            <input type="number" step="any" name="lng" id="lng" placeholder="106.660172"
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="radius_m" class="block text-sm font-medium text-gray-700">Radius (meters)</label>
                            <input type="number" name="radius_m" id="radius_m" value="200" min="10"
                                   class="mt-1 block w-full rounded-md shadow-sm sm:text-sm py-1.5 px-3 ring-1 ring-inset ring-gray-300 focus:ring-indigo-500">
                        </div>
                    </div>
                </fieldset>

                <div class="flex justify-end gap-3">
                    <a href="/branches" class="rounded-md bg-white px-4 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Cancel</a>
                    <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Create Branch</button>
                </div>
            </form>
        </div>
    </main>
</div>
{{end}}
