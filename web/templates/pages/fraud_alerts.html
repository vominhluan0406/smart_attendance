{{define "title"}}Cảnh báo gian lận — Smart Attendance{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Cảnh báo gian lận</h1>
            <p class="text-sm text-gray-500 mt-1">Phát hiện hành vi bất thường khi chấm công</p>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6">
            <form id="filter-form" class="flex flex-wrap gap-4 items-end"
                hx-get="/alerts/partial"
                hx-target="#alerts-list"
                hx-swap="innerHTML"
                hx-push-url="false">

                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Từ ngày</label>
                    <input type="date" name="date_from" value="{{.DateFrom}}"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                </div>

                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Đến ngày</label>
                    <input type="date" name="date_to" value="{{.DateTo}}"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                </div>

                <div class="w-44">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Loại cảnh báo</label>
                    <select name="alert_type"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                        <option value="">Tất cả</option>
                        <option value="gps_accuracy" {{if eq .AlertType "gps_accuracy"}}selected{{end}}>GPS giả mạo</option>
                        <option value="totp_reuse" {{if eq .AlertType "totp_reuse"}}selected{{end}}>QR tái sử dụng</option>
                        <option value="impossible_travel" {{if eq .AlertType "impossible_travel"}}selected{{end}}>Di chuyển bất thường</option>
                        <option value="new_device" {{if eq .AlertType "new_device"}}selected{{end}}>Thiết bị mới</option>
                        <option value="ip_location_mismatch" {{if eq .AlertType "ip_location_mismatch"}}selected{{end}}>IP/GPS lệch</option>
                        <option value="cloned_authenticator" {{if eq .AlertType "cloned_authenticator"}}selected{{end}}>Clone authenticator</option>
                        <option value="anomaly_time" {{if eq .AlertType "anomaly_time"}}selected{{end}}>Thời gian bất thường</option>
                        <option value="concurrent_session" {{if eq .AlertType "concurrent_session"}}selected{{end}}>Đa phiên</option>
                    </select>
                </div>

                <div class="w-32">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Mức độ</label>
                    <select name="severity"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                        <option value="">Tất cả</option>
                        <option value="critical" {{if eq .Severity "critical"}}selected{{end}}>Nghiêm trọng</option>
                        <option value="warning" {{if eq .Severity "warning"}}selected{{end}}>Cảnh báo</option>
                    </select>
                </div>

                <div class="w-36">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Trạng thái</label>
                    <select name="reviewed"
                        class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2 px-3 ring-1 ring-inset ring-gray-300">
                        <option value="">Tất cả</option>
                        <option value="false" {{if eq .Reviewed "false"}}selected{{end}}>Chưa xem xét</option>
                        <option value="true" {{if eq .Reviewed "true"}}selected{{end}}>Đã xem xét</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button type="submit"
                        class="flex items-center gap-2 rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-200 transition-colors">
                        <i data-lucide="search" class="w-4 h-4"></i>
                        Lọc
                    </button>
                    <a href="/alerts"
                        class="rounded-lg bg-white border border-gray-200 px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-50 transition-colors">
                        Xoá lọc
                    </a>
                </div>
            </form>
        </div>

        {{if .Error}}
        <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
            <div class="flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
                <p class="text-sm text-red-700">{{.Error}}</p>
            </div>
        </div>
        {{end}}

        <!-- Table content (HTMX target) -->
        <div id="alerts-list" class="relative">
            {{template "fraud_alerts_list.html" .}}
        </div>
    </main>
</div>
{{end}}
