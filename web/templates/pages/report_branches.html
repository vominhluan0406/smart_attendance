{{define "title"}}Báo cáo theo chi nhánh — Smart Attendance{{end}}

{{define "body"}}
<div class="min-h-full">
    {{template "nav" .}}
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Báo cáo chấm công</h1>
            <p class="mt-2 text-lg text-gray-500">Chọn chi nhánh để xem báo cáo chi tiết</p>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
            {{range .Branches}}
            <div class="group relative bg-white rounded-3xl shadow-sm border border-gray-100 p-6 hover:shadow-xl hover:border-indigo-100 transition-all duration-300">
                <div class="flex items-start justify-between mb-4">
                    <div class="p-3 bg-indigo-50 rounded-2xl group-hover:bg-indigo-600 transition-colors duration-300">
                        <i data-lucide="building-2" class="w-6 h-6 text-indigo-600 group-hover:text-white transition-colors duration-300"></i>
                    </div>
                </div>
                
                <h3 class="text-xl font-bold text-gray-900 mb-2">{{.Name}}</h3>
                <p class="text-sm text-gray-500 line-clamp-2 mb-6 min-h-[40px]">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 inline mr-1"></i>
                    {{.Address}}
                </p>

                <div class="pt-4 border-t border-gray-50">
                    <a href="/reports/branch/{{.ID}}" 
                       class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gray-900 px-4 py-3 text-sm font-bold text-white hover:bg-gray-800 active:scale-95 transition-all shadow-sm">
                        <i data-lucide="file-bar-chart" class="w-4 h-4"></i>
                        Xem báo cáo
                    </a>
                </div>
            </div>
            {{else}}
            <div class="col-span-full py-16 text-center bg-white rounded-3xl border-2 border-dashed border-gray-200">
                <i data-lucide="alert-circle" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
                <p class="text-gray-500 font-medium">Chưa có chi nhánh nào được thiết lập.</p>
            </div>
            {{end}}
        </div>
    </main>
</div>
{{end}}
