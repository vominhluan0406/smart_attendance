{{define "title"}}Smart Attendance — Chấm công WiFi + GPS{{end}}

{{define "body"}}
<div class="min-h-full bg-gray-50 pb-12">
    {{template "nav" .}}

    <main class="mx-auto max-w-lg px-4 py-12 sm:px-6 lg:px-8">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 animate-in fade-in zoom-in duration-500">
            <div class="p-8 text-center" id="status-container">
                <div class="inline-flex items-center justify-center p-4 bg-emerald-50 rounded-full mb-6">
                    <i data-lucide="map-pin" class="w-10 h-10 text-emerald-600 animate-pulse"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Đang xác thực...</h2>
                <p class="text-gray-500 mb-8" id="status-text">Vui lòng cho phép truy cập vị trí để hoàn tất chấm công qua WiFi + GPS.</p>

                <div class="space-y-4">
                    <div id="gps-status" class="flex items-center justify-center text-sm text-gray-400">
                        <span class="relative flex h-2 w-2 mr-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-gray-400"></span>
                        </span>
                        Đang lấy tọa độ GPS...
                    </div>
                </div>

                <!-- Hidden form for HTMX submission -->
                <form id="checkin-form" hx-post="/attendance/log" hx-target="#status-container" hx-swap="outerHTML" class="hidden">
                    <input type="hidden" name="lat" id="lat">
                    <input type="hidden" name="lng" id="lng">
                    <input type="hidden" name="accuracy" id="accuracy">
                    <input type="hidden" name="device_fingerprint" id="device_fingerprint">
                    <input type="hidden" name="biometric_verified" id="biometric_verified" value="0">
                    <button type="submit" id="submit-btn"></button>
                </form>

                <div class="mt-8">
                    <a href="/" class="text-sm font-medium text-emerald-600 hover:text-emerald-700 flex items-center justify-center gap-1">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>
{{end}}

{{define "scripts"}}
<script>
    function startAutoCheckin() {
        const latField = document.getElementById('lat');
        const lngField = document.getElementById('lng');
        const gpsStatus = document.getElementById('gps-status');
        const statusText = document.getElementById('status-text');

        if (!navigator.geolocation) {
            gpsStatus.innerHTML = '<span class="text-red-500">Trình duyệt không hỗ trợ GPS</span>';
            return;
        }

        gpsStatus.innerHTML = '<span class="relative flex h-2 w-2 mr-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-500 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span> Đang lấy vị trí...';
        gpsStatus.classList.replace('text-gray-400', 'text-blue-600');

        let gpsCompleted = false;
        // Manual safety timeout for 6 seconds (just after the GPS 5s timeout)
        setTimeout(() => {
            if (!gpsCompleted) {
                handleGPSError({ message: "Hết thời gian chờ (Timeout)" });
            }
        }, 6000);

        function handleGPSError(err) {
            if (gpsCompleted) return;
            gpsCompleted = true;
            gpsStatus.innerHTML = '<span class="text-red-500">Lỗi GPS: ' + err.message + '</span>';
            statusText.innerText = 'Không thể lấy vị trí. Vui lòng bật định vị cao (High Accuracy) và thử lại.';
            
            // Show retry button
            const retryBtn = document.createElement('div');
            retryBtn.className = 'mt-6';
            retryBtn.innerHTML = `
                <button onclick="location.reload()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition-all">
                    Thử lại
                </button>
            `;
            gpsStatus.parentNode.appendChild(retryBtn);
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                if (gpsCompleted) return;
                gpsCompleted = true;
                latField.value = pos.coords.latitude;
                lngField.value = pos.coords.longitude;
                var accField = document.getElementById('accuracy');
                if (accField) accField.value = pos.coords.accuracy;

                gpsStatus.innerHTML = '<span class="relative flex h-2 w-2 mr-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span> Đã lấy được vị trí (±' + Math.round(pos.coords.accuracy) + 'm)';
                gpsStatus.classList.replace('text-blue-600', 'text-green-600');
                statusText.innerText = 'Đang xác thực bảo mật...';

                // Check if Biometric is required
                if ("{{.BiometricRequired}}" === "true") {
                    authenticateBiometric(function(success, errMsg) {
                        if (success) {
                            document.getElementById('biometric_verified').value = "1";
                            document.getElementById('submit-btn').click();
                        } else {
                            document.getElementById('checking-ui').classList.add('hidden');
                            document.getElementById('ui-container').classList.remove('hidden');
                            const resultEl = document.getElementById('checkin-result');
                            resultEl.innerHTML = '<div class="p-4 bg-red-50 text-red-700 font-bold rounded-xl mb-4 text-center">' + (errMsg || "Xác thực thất bại") + '</div>';
                        }
                    });
                } else {
                    document.getElementById('submit-btn').click();
                }
            },
            handleGPSError,
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }

    // Start immediately
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startAutoCheckin);
    } else {
        startAutoCheckin();
    }
    async function authenticateBiometric(callback) {
        try {
            const beginResp = await fetch('/api/webauthn/login/begin');
            if (!beginResp.ok) {
                const err = await beginResp.json();
                throw new Error(err.error || 'Vui lòng đăng ký thiết bị sinh trắc học trước trong phần Hồ sơ.');
            }
            
            const options = await beginResp.json();
            options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
            if (options.publicKey.allowCredentials) {
                options.publicKey.allowCredentials.forEach(c => {
                    c.id = base64urlToBuffer(c.id);
                });
            }

            const assertion = await navigator.credentials.get({
                publicKey: options.publicKey
            });

            const assertionJson = {
                id: assertion.id,
                rawId: bufferToBase64url(assertion.rawId),
                type: assertion.type,
                response: {
                    authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                    clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                    signature: bufferToBase64url(assertion.response.signature),
                    userHandle: assertion.response.userHandle ? bufferToBase64url(assertion.response.userHandle) : null
                }
            };

            const finishResp = await fetch('/api/webauthn/login/finish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(assertionJson)
            });

            if (!finishResp.ok) throw new Error('Xác thực thất bại');
            
            callback(true, null);
        } catch (err) {
            console.error('Lỗi Sinh trắc học:', err);
            callback(false, err.message);
        }
    }

    // Helper to convert base64url to buffer
    function base64urlToBuffer(base64url) {
        const padding = "==".slice(0, (4 - base64url.length % 4) % 4);
        const base64 = (base64url + padding).replace(/\-/g, '+').replace(/_/g, '/');
        const raw = atob(base64);
        return Uint8Array.from(raw, c => c.charCodeAt(0));
    }

    // Helper to convert buffer to base64url
    function bufferToBase64url(buffer) {
        const bytes = new Uint8Array(buffer);
        let str = '';
        for (let i = 0; i < bytes.byteLength; i++) {
            str += String.fromCharCode(bytes[i]);
        }
        return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
</script>
{{end}}
